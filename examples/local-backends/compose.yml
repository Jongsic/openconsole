# Local AWS-compatible backends for trying OpenConsole against.
#
# Each backend sits behind a Compose *profile*, so you start only what you need:
#
#   docker compose --profile floci      up -d
#   docker compose --profile localstack up -d
#   docker compose --profile minio      up -d
#   docker compose --profile moto       up -d
#
# Host ports are overridable (defaults in parentheses). Handy when something already
# occupies a port — e.g. run Floci on 4567 without touching a LocalStack on 4566:
#
#   FLOCI_PORT=4567 docker compose --profile floci up -d
#
# ⚠️  Floci and LocalStack both default to host port 4566. To run them together, give
#     one a different port:  LOCALSTACK_PORT=4567 docker compose --profile localstack up -d
#
# CORS is fully open on every backend below (all origins allowed), so the app can talk
# to them from the browser no matter what origin you serve it from. This is convenient
# for local dev only — do NOT copy these wide-open CORS settings to anything exposed.
#
# Stop / clean up:
#   docker compose --profile <name> down            # stop
#   docker compose --profile <name> down -v         # stop + drop data volumes

name: openconsole-backends

services:
  # Floci — github.com/floci-io/floci. LocalStack drop-in that really runs
  # container-backed services (EC2/ECS/...), so it needs the Docker socket and a
  # network to attach spawned containers to.
  floci:
    image: floci/floci:latest
    profiles: ["floci"]
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    environment:
      # floci's CORS filter: "*" or a comma-separated list of exact origins (no regex).
      FLOCI_SECURITY_EXTRA_CORS_ALLOWED_ORIGINS: "*"
      # Lets an HTTPS-hosted UI reach this loopback floci (Chrome Private Network Access).
      # No-op on current images — takes effect once floci-io/floci#1530 is merged & released.
      FLOCI_SECURITY_CORS_ALLOW_PRIVATE_NETWORK: "true"
      FLOCI_SERVICES_DOCKER_NETWORK: openconsole-backends_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - floci-data:/app/data

  # LocalStack — community edition. EC2/S3/etc. work; ELB/ASG are Pro-only and will
  # surface as "not supported" in the UI.
  # Pin the major tag: "latest" can resolve to a Pro-gated image that exits demanding
  # a license, whereas "localstack/localstack:4" is the free community line.
  localstack:
    image: localstack/localstack:4
    profiles: ["localstack"]
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    environment:
      # Turn off the gateway-level CORS enforcement.
      DISABLE_CORS_CHECKS: "1"
      # The S3 provider does its OWN CORS origin check that ignores DISABLE_CORS_CHECKS,
      # so preflights from a non-default origin (e.g. the app on :3939) 403 without this.
      # Wildcard = allow any origin (local dev only).
      EXTRA_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # MinIO — S3 only.
  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio-data:/data

  # moto — moto_server standalone mock (dashboard at /moto-api/).
  moto:
    image: motoserver/moto:latest
    profiles: ["moto"]
    ports:
      - "${MOTO_PORT:-5000}:5000"

volumes:
  floci-data:
  minio-data:
