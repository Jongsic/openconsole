name: Bug report
description: Report a problem with OpenConsole
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please do **not** include real credentials or secrets.
        For security vulnerabilities, see SECURITY.md instead of filing a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including steps to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - LocalStack
        - MinIO
        - Real AWS
        - Other S3-compatible
        - Not applicable
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 130 on macOS 15
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console / network errors
      description: Paste any relevant browser console or network errors (redact secrets).
      render: shell
    validations:
      required: false
