name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Gate: the triggering tag must carry a valid GPG signature from a trusted key.
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # checkout leaves the triggering tag as a lightweight ref to the commit;
      # re-fetch the annotated tag object so its signature can be verified.
      - name: Fetch annotated tag object
        run: git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
      - name: Import trusted signing key
        env:
          SIGNING_PUBLIC_KEY: ${{ vars.SIGNING_PUBLIC_KEY }}
        run: printf '%s' "$SIGNING_PUBLIC_KEY" | gpg --import
      - name: Verify tag signature
        run: git verify-tag "$GITHUB_REF_NAME"

  # GitHub Release with the prebuilt static bundle + checksums.
  # (GitHub also auto-attaches the "Source code" archives.)
  assets:
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Package static bundle + checksums
        run: |
          name="openconsole-${GITHUB_REF_NAME}-static.zip"
          (cd dist && zip -qr "../$name" .)
          sha256sum "$name" > SHA256SUMS.txt
          echo "ASSET=$name" >> "$GITHUB_ENV"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$ASSET" SHA256SUMS.txt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  # Docker image (nginx serving the built site) -> GHCR always; Docker Hub if secrets exist.
  docker:
    needs: verify-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Set repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN to also push to Docker Hub.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v7

      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          ghcr="ghcr.io/${GITHUB_REPOSITORY,,}"
          tags="${ghcr}:${version},${ghcr}:latest"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            dh="docker.io/${DOCKERHUB_USERNAME}/openconsole"
            tags="${tags},${dh}:${version},${dh}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # dist is arch-neutral and built once on the native runner (see Dockerfile's
          # --platform=$BUILDPLATFORM), so amd64+arm64 costs ~one extra nginx-base pull.
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.meta.outputs.created }}
          # No SLSA provenance/SBOM attestations: they wrap the image in an OCI
          # index whose attestation manifest shows up as an untagged GHCR version
          # on every build. Not worth it for a static nginx site.
          provenance: false
          sbom: false

      # A multi-arch tag is a manifest list whose per-platform child manifests are
      # themselves untagged. A naive "delete every untagged version" would delete
      # those children and corrupt the live tag, so use a manifest-list-aware cleaner:
      # it prunes only untagged versions NOT referenced by any tagged manifest list
      # (i.e. the orphans left when "latest" is retagged).
      - name: Prune untagged GHCR versions
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: openconsole
          delete-untagged: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub doesn't sync from GitHub — push the README as the repo overview.
      # The token must be a Docker Hub PAT with write access to the repository.
      - name: Sync Docker Hub description
        if: env.DOCKERHUB_USERNAME != ''
        continue-on-error: true # cosmetic — a description failure shouldn't fail the release
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/openconsole
          short-description: "A browser-only console for LocalStack, MinIO, and AWS"
          readme-filepath: ./README.md
